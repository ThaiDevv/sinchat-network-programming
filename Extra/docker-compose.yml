# docker-compose.yml
version: "3.8"

services:
  app:
    build: ../Code/Server
    container_name: sinchat_server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - DB_URL=jdbc:mysql://db:3306/sinchat
      - DB_USER=root
      - DB_PASSWORD=root
      - PORT=3000

  db:
    image: mysql:8
    container_name: sinchat_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=sinchat
    ports:
      - "3306:3306"
    volumes:
      - ../Code/Database/dump-roacqgfa_ltm-202605132325.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
